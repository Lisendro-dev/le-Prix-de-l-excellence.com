<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prix d'Excellence - Cité Arc-en-Ciel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#0b5ed7;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.section{
    margin-bottom:25px;
    padding:20px;
    border:1px solid #e5e5e5;
    border-radius:10px;
}

.section h2{
    color:#198754;
    margin-bottom:15px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:600;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:5px;
}

.child{
    margin-top:20px;
    background:#f8f9fa;
    padding:20px;
    border-radius:10px;
}

.hidden{
    display:none;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:15px;
}

.checkbox input{
    width:auto;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#1eb85a;
}
</style>
</head>
<body>

<div class="container">

<h1>🏆 Prix d'Excellence — Cité Arc-en-Ciel</h1>

<p class="subtitle">
Encourageons l'effort et célébrons la réussite de nos enfants !
</p>

<form id="inscriptionForm">

<div class="section">
<h2>Informations du Parent Responsable</h2>

<label>Nom et Prénom du Parent</label>
<input type="text" id="parent" required>

<label>Téléphone / WhatsApp</label>
<input type="tel" id="phone" required>

<label>Numéro de Villa</label>
<input type="text" id="villa" required>
</div>

<div class="section">
<h2>Nombre d'Enfants à Présenter</h2>

<select id="nombreEnfants">
<option value="1">1 enfant</option>
<option value="2">2 enfants</option>
<option value="3">3 enfants</option>
<option value="4">4 enfants ou plus</option>
</select>
</div>

<div id="enfantsContainer"></div>

<div class="section">
<h2>Attestation</h2>

<div class="checkbox">
<input type="checkbox" id="attestation" required>
<label for="attestation">
Je certifie l'exactitude des notes saisies et l'authenticité des bulletins joints.
</label>
</div>
</div>

<button type="submit">
📤 Envoyer la candidature sur WhatsApp
</button>

</form>

</div>

<script>

const container = document.getElementById("enfantsContainer");
const select = document.getElementById("nombreEnfants");

function genererEnfants() {

container.innerHTML = "";

let total = parseInt(select.value);

if(total === 4) total = 4;

for(let i=1;i<=total;i++){

container.innerHTML += `
<div class="section child">

<h2>👨‍🎓 Enfant ${i}</h2>

<label>Nom et Prénoms</label>
<input type="text" id="nom${i}" required>

<label>Niveau Scolaire</label>
<select id="niveau${i}">
<option>Primaire</option>
<option>Collège</option>
<option>Lycée</option>
</select>

<label>Classe précise</label>
<input type="text" id="classe${i}" required>

<label>Moyenne Générale Annuelle</label>
<input type="number" step="0.01" id="moyenne${i}" required>

<label>Bulletin / Relevé de notes</label>
<input type="file"
accept=".pdf,.jpg,.jpeg,.png">

</div>
`;
}

}

genererEnfants();

select.addEventListener("change",genererEnfants);

document.getElementById("inscriptionForm")
.addEventListener("submit",function(e){

e.preventDefault();

const numeroPrincipal = "2250140100346";

let message =
`🏆 PRIX D'EXCELLENCE - CITÉ ARC-EN-CIEL

👤 Parent : ${parent.value}
📞 Téléphone : ${phone.value}
🏠 Villa : ${villa.value}

Nombre d'enfants : ${select.value}
`;

let total = parseInt(select.value);

if(total === 4) total = 4;

for(let i=1;i<=total;i++){

message += `

👨‍🎓 ENFANT ${i}
Nom : ${document.getElementById("nom"+i).value}
Niveau : ${document.getElementById("niveau"+i).value}
Classe : ${document.getElementById("classe"+i).value}
Moyenne : ${document.getElementById("moyenne"+i).value}
`;
}

message += `

⚠️ Merci de joindre les bulletins et diplômes dans cette conversation WhatsApp.`;

window.open(
`https://wa.me/${numeroPrincipal}?text=${encodeURIComponent(message)}`,
'_blank'
);

});
</script>

</body>
</html>
